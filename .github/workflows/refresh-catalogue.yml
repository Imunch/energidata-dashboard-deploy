name: Refresh Data Catalogue

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run enhanced pipeline
        run: python deploy/refresh_energidata_pipeline.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html energidata_enriched.json
          git commit -m "chore: refresh catalogue with live data from Energi Data Service API

          Enhanced pipeline with sample data enrichment and quality metrics
          Automated refresh — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
